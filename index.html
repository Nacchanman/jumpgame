<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>勇者ジャンプアクション</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.45), transparent 35%),
        linear-gradient(180deg, #6faee8 0%, #cfe7fb 58%, #ecf7ff 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-wrap {
      width: min(100vw, 1100px);
      padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: #102a43;
      font-weight: bold;
      flex-wrap: wrap;
    }

    .hud-left, .hud-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hud-pill {
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(242,248,255,0.82));
      border: 1px solid rgba(255, 255, 255, 0.65);
      padding: 7px 12px;
      border-radius: 999px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.7),
        0 8px 18px rgba(13, 38, 76, 0.12);
      backdrop-filter: blur(4px);
    }

    .life-display {
      letter-spacing: 2px;
      font-size: 20px;
    }

    #gameCanvas {
      width: 100%;
      height: auto;
      display: block;
      border: 2px solid rgba(9, 28, 58, 0.7);
      border-radius: 22px;
      background: linear-gradient(180deg, #78b8ef 0%, #d8efff 66%, #f2fbff 100%);
      box-shadow:
        0 20px 40px rgba(6, 24, 44, 0.24),
        inset 0 1px 0 rgba(255,255,255,0.55);
      max-height: 58vh;
      object-fit: contain;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: #17324d;
      font-size: 14px;
    }

    .mobile-controls {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 10px;
      flex-wrap: nowrap;
    }

    .control-button {
      appearance: none;
      border: none;
      color: #fff;
      font-weight: bold;
      border-radius: 22px;
      min-height: 64px;
      padding: 12px 20px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        0 12px 22px rgba(0, 0, 0, 0.2);
      font-size: 20px;
    }

    .jump-button {
      min-width: 220px;
      background: linear-gradient(180deg, #ffb347, #f77f00);
    }

    .attack-button {
      min-width: 180px;
      background: linear-gradient(180deg, #5397ff, #2457b5);
    }

    .restart-button {
      min-width: 100px;
      background: linear-gradient(180deg, #9aa7bf, #5c677d);
      font-size: 18px;
    }

    .control-button:active {
      transform: translateY(2px) scale(0.99);
    }

    .kbd {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid #17324d;
      border-bottom-width: 3px;
      border-radius: 6px;
      background: white;
      font-size: 12px;
      font-weight: bold;
      margin: 0 2px;
    }

    .rotate-message {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 20, 35, 0.92);
      color: white;
      z-index: 20;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      font-size: 24px;
      line-height: 1.7;
      font-weight: bold;
    }

    @media (max-width: 900px) and (orientation: portrait) {
      .rotate-message {
        display: flex;
      }
    }

    @media (max-width: 900px) {
      .game-wrap {
        width: 100vw;
        padding-top: max(6px, env(safe-area-inset-top));
        padding-bottom: max(6px, env(safe-area-inset-bottom));
      }

      .hud {
        margin-bottom: 4px;
        gap: 6px;
      }

      .hud-left, .hud-right {
        gap: 6px;
      }

      .hud-pill {
        padding: 4px 8px;
        font-size: 12px;
      }

      .life-display {
        font-size: 16px;
      }

      #gameCanvas {
        max-height: 50vh;
        border-radius: 18px;
      }

      .controls {
        font-size: 11px;
        margin-top: 6px;
        gap: 6px;
      }

      .mobile-controls {
        gap: 8px;
        margin-top: 8px;
      }

      .jump-button {
        min-width: 38vw;
      }

      .attack-button {
        min-width: 26vw;
      }

      .restart-button {
        min-width: 16vw;
      }

      .control-button {
        min-height: 52px;
        font-size: 17px;
        padding: 10px 12px;
        border-radius: 16px;
      }
    }

    @media (max-width: 900px) and (orientation: landscape) {
      body {
        align-items: flex-start;
      }

      .game-wrap {
        padding-left: max(6px, env(safe-area-inset-left));
        padding-right: max(6px, env(safe-area-inset-right));
      }

      #gameCanvas {
        max-height: 46vh;
      }

      .controls {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="rotate-message">
    スマホは横向きで遊ぶのがおすすめです。<br>
    端末を横向きにしてください。
  </div>

  <div class="game-wrap">
    <div class="hud">
      <div class="hud-left">
        <div class="hud-pill">スコア: <span id="score">0</span></div>
        <div class="hud-pill">ベスト: <span id="bestScore">0</span></div>
        <div class="hud-pill">ライフ: <span id="lifeDisplay" class="life-display">❤️❤️❤️</span></div>
      </div>
      <div class="hud-right">
        <div class="hud-pill">剣: <span id="swordStatus">なし</span></div>
        <div class="hud-pill"><span id="status">ジャンプでスタート</span></div>
      </div>
    </div>

    <canvas id="gameCanvas" width="1100" height="520"></canvas>

    <div class="mobile-controls">
      <button class="control-button jump-button" id="jumpButton" aria-label="ジャンプ">ジャンプ</button>
      <button class="control-button attack-button" id="attackButton" aria-label="攻撃">攻撃</button>
      <button class="control-button restart-button" id="restartButton" aria-label="再開">再開</button>
    </div>

    <div class="controls">
      <div>
        操作: <span class="kbd">Space</span> / <span class="kbd">↑</span> でジャンプ、
        <span class="kbd">X</span> で攻撃、<span class="kbd">R</span> で再開
      </div>
      <div>怪獣の炎はジャンプで回避</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('bestScore');
    const lifeDisplayEl = document.getElementById('lifeDisplay');
    const swordStatusEl = document.getElementById('swordStatus');
    const statusEl = document.getElementById('status');
    const jumpButton = document.getElementById('jumpButton');
    const attackButton = document.getElementById('attackButton');
    const restartButton = document.getElementById('restartButton');

    const GROUND_Y = 410;
    const GRAVITY = 0.82;
    const JUMP_POWER = -16.5;
    const PLAYER_X = 155;
    const MAX_LIFE = 3;
    const HIT_INVINCIBLE_FRAMES = 70;
    const ATTACK_TOTAL_FRAMES = 30;

    let gameSpeed = 6;
    let frameCount = 0;
    let score = 0;
    let life = MAX_LIFE;
    let bestScore = Number(localStorage.getItem('heroJumpBestScore') || 0);
    let gameState = 'ready';
    let groundOffset = 0;

    const player = {
      x: PLAYER_X,
      y: GROUND_Y - 76,
      width: 58,
      height: 76,
      vy: 0,
      isOnGround: true,
      animTimer: 0,
      hasSword: false,
      isAttacking: false,
      attackTimer: 0,
      invincibleTimer: 0
    };

    let obstacles = [];
    let enemies = [];
    let projectiles = [];
    let items = [];
    let particles = [];
    let clouds = createClouds();
    let sparkles = createSparkles();

    bestScoreEl.textContent = String(bestScore);
    updateLifeUI();
    updateSwordUI();

    function createClouds() {
      return Array.from({ length: 6 }, (_, i) => ({
        x: i * 220 + 50,
        y: 40 + Math.random() * 120,
        w: 85 + Math.random() * 55,
        h: 26 + Math.random() * 20,
        speed: 0.5 + Math.random() * 0.6
      }));
    }

    function createSparkles() {
      return Array.from({ length: 18 }, () => ({
        x: Math.random() * canvas.width,
        y: 30 + Math.random() * 170,
        r: 0.6 + Math.random() * 1.8,
        a: 0.2 + Math.random() * 0.5,
        tw: Math.random() * Math.PI * 2
      }));
    }

    function updateLifeUI() {
      lifeDisplayEl.textContent = '❤️'.repeat(life) + '🖤'.repeat(MAX_LIFE - life);
    }

    function updateSwordUI() {
      swordStatusEl.textContent = player.hasSword ? '装備中' : 'なし';
    }

    function resetGame() {
      gameSpeed = 6;
      frameCount = 0;
      score = 0;
      life = MAX_LIFE;
      obstacles = [];
      enemies = [];
      projectiles = [];
      items = [];
      particles = [];
      groundOffset = 0;
      player.y = GROUND_Y - player.height;
      player.vy = 0;
      player.isOnGround = true;
      player.animTimer = 0;
      player.hasSword = false;
      player.isAttacking = false;
      player.attackTimer = 0;
      player.invincibleTimer = 0;
      scoreEl.textContent = '0';
      updateLifeUI();
      updateSwordUI();
      statusEl.textContent = 'ジャンプでスタート';
      gameState = 'ready';
    }

    function startGame() {
      if (gameState === 'ready') {
        gameState = 'playing';
        statusEl.textContent = '勇者を操作して進もう';
      }
    }

    function restartGame() {
      resetGame();
      gameState = 'playing';
      statusEl.textContent = '勇者を操作して進もう';
    }

    function jump() {
      if (gameState === 'gameover') return;
      startGame();
      if (player.isOnGround) {
        player.vy = JUMP_POWER;
        player.isOnGround = false;
        spawnDust(player.x + 12, GROUND_Y - 8, 8);
      }
    }

    function attack() {
      if (gameState !== 'playing') return;
      if (!player.hasSword) return;
      if (player.isAttacking) return;
      player.isAttacking = true;
      player.attackTimer = ATTACK_TOTAL_FRAMES;
      spawnSwingDust();
    }

    function spawnSwingDust() {
      for (let i = 0; i < 7; i++) {
        particles.push({
          type: 'dust',
          x: player.x + player.width + 10,
          y: player.y + 30 + Math.random() * 25,
          vx: 1 + Math.random() * 4,
          vy: -2 + Math.random() * 3,
          size: 3 + Math.random() * 4,
          life: 10 + Math.random() * 8,
          color: 'rgba(80,80,80,0.22)'
        });
      }
    }

    function spawnDust(x, y, amount = 6) {
      for (let i = 0; i < amount; i++) {
        particles.push({
          type: 'dust',
          x,
          y,
          vx: -2 + Math.random() * 4,
          vy: -1 - Math.random() * 2,
          size: 3 + Math.random() * 4,
          life: 20 + Math.random() * 10,
          color: 'rgba(60,60,60,0.32)'
        });
      }
    }

    function spawnExplosion(x, y, fiery = true) {
      for (let i = 0; i < 24; i++) {
        particles.push({
          type: 'explosion',
          x,
          y,
          vx: -4 + Math.random() * 8,
          vy: -4 + Math.random() * 8,
          size: 4 + Math.random() * 7,
          life: 18 + Math.random() * 20,
          color: fiery
            ? (Math.random() > 0.4 ? 'rgba(255,170,0,0.88)' : 'rgba(255,90,0,0.88)')
            : 'rgba(180,220,255,0.65)'
        });
      }
    }

    function spawnHealSparkle(x, y) {
      for (let i = 0; i < 18; i++) {
        particles.push({
          type: 'heal',
          x,
          y,
          vx: -2.5 + Math.random() * 5,
          vy: -3 + Math.random() * 4,
          size: 3 + Math.random() * 5,
          life: 20 + Math.random() * 12,
          color: Math.random() > 0.5 ? 'rgba(255,255,255,0.95)' : 'rgba(255,105,180,0.85)'
        });
      }
    }

    function spawnFlameTrail(x, y) {
      particles.push({
        type: 'ember',
        x,
        y,
        vx: -1.8 - Math.random() * 1.8,
        vy: -0.4 + Math.random() * 0.8,
        size: 3 + Math.random() * 4,
        life: 10 + Math.random() * 8,
        color: Math.random() > 0.5 ? 'rgba(255,210,90,0.9)' : 'rgba(255,90,0,0.9)'
      });
    }

    function spawnObstacle() {
      const width = 28 + Math.random() * 34;
      const height = 44 + Math.random() * 62;
      obstacles.push({
        type: 'rock',
        x: canvas.width + 40,
        y: GROUND_Y - height,
        width,
        height,
        passed: false
      });
    }

    function spawnEnemy(type = 'knight') {
      if (type === 'beast') {
        enemies.push({
          type: 'beast',
          x: canvas.width + 50,
          y: GROUND_Y - 96,
          width: 118,
          height: 96,
          passed: false,
          anim: Math.random() * Math.PI * 2,
          fireCooldown: 90 + Math.random() * 40,
          hasBreathed: false
        });
        return;
      }

      enemies.push({
        type: 'knight',
        x: canvas.width + 40,
        y: GROUND_Y - 62,
        width: 52,
        height: 62,
        passed: false,
        anim: Math.random() * Math.PI * 2
      });
    }

    function spawnFireball(beast) {
      const mouthX = beast.x - 6;
      const mouthY = beast.y + 24;
      const targetY = player.y + player.height * 0.42;
      const dy = targetY - mouthY;
      const vx = -(gameSpeed + 6.2);
      const vy = Math.max(-1.2, Math.min(1.2, dy / 90));

      projectiles.push({
        type: 'fire',
        x: mouthX,
        y: mouthY,
        width: 58,
        height: 24,
        vx,
        vy,
        anim: 0,
        corePhase: Math.random() * Math.PI * 2
      });

      for (let i = 0; i < 18; i++) {
        spawnFlameTrail(mouthX + 8, mouthY + 10);
      }
    }

    function spawnItem(type) {
      const isHeart = type === 'heart';
      const y = isHeart ? GROUND_Y - 150 - Math.random() * 55 : GROUND_Y - 95 - Math.random() * 35;
      items.push({
        type,
        x: canvas.width + 40,
        y,
        width: isHeart ? 28 : 50,
        height: isHeart ? 28 : 18,
        bob: Math.random() * Math.PI * 2,
        baseY: y
      });
    }

    function maybeSpawnEntities() {
      const obstacleInterval = Math.max(78, 124 - Math.floor(score / 4));
      const enemyInterval = Math.max(140, 255 - Math.floor(score * 1.2));
      const beastInterval = Math.max(360, 620 - Math.floor(score * 3.2));

      const nearestFrontObstacle = obstacles.find(o => o.x > canvas.width * 0.62);
      const nearestFrontEnemy = enemies.find(e => e.x > canvas.width * 0.6);

      if (frameCount % obstacleInterval === 0 && !nearestFrontObstacle) {
        spawnObstacle();
      }

      const safeFromObstacle = !obstacles.some(o => o.x > canvas.width * 0.52 && o.x < canvas.width * 0.9);
      const safeFromEnemy = !nearestFrontEnemy;
      const enoughTimePassed = frameCount > 210;
      const dynamicEnemyChance = Math.min(0.82, 0.32 + score * 0.01);

      if (
        enoughTimePassed &&
        frameCount % enemyInterval === 0 &&
        safeFromObstacle &&
        safeFromEnemy &&
        Math.random() < dynamicEnemyChance
      ) {
        spawnEnemy('knight');
      }

      const canSpawnBeast = frameCount > 500 && frameCount % beastInterval === 0 && !enemies.some(e => e.type === 'beast');
      if (canSpawnBeast && Math.random() < 0.55) {
        spawnEnemy('beast');
      }

      if (frameCount > 120 && frameCount % 210 === 0 && !player.hasSword && Math.random() < 0.6) {
        spawnItem('sword');
      }

      if (frameCount > 160 && frameCount % 390 === 0 && Math.random() < 0.22) {
        spawnItem('heart');
      }
    }

    function updatePlayer() {
      player.vy += GRAVITY;
      player.y += player.vy;
      player.animTimer += 1;

      if (player.y >= GROUND_Y - player.height) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.isOnGround = true;
      }

      if (player.attackTimer > 0) {
        player.attackTimer -= 1;
      } else {
        player.isAttacking = false;
      }

      if (player.invincibleTimer > 0) {
        player.invincibleTimer -= 1;
      }
    }

    function updateEntities() {
      for (const obstacle of obstacles) {
        obstacle.x -= gameSpeed;
        if (!obstacle.passed && obstacle.x + obstacle.width < player.x) {
          obstacle.passed = true;
          gainScore(1);
        }
      }
      obstacles = obstacles.filter(o => o.x + o.width > -80);

      for (const enemy of enemies) {
        if (enemy.type === 'beast') {
          enemy.x -= gameSpeed * 0.8;
          enemy.anim += 0.08;
          enemy.fireCooldown -= 1;
          if (enemy.fireCooldown <= 0 && !enemy.hasBreathed && enemy.x < canvas.width * 0.9 && enemy.x > canvas.width * 0.45) {
            spawnFireball(enemy);
            enemy.hasBreathed = true;
          }
          if (!enemy.passed && enemy.x + enemy.width < player.x) {
            enemy.passed = true;
            gainScore(4);
          }
        } else {
          enemy.x -= gameSpeed + 1;
          enemy.anim += 0.14;
          if (!enemy.passed && enemy.x + enemy.width < player.x) {
            enemy.passed = true;
            gainScore(2);
          }
        }
      }
      enemies = enemies.filter(e => e.x + e.width > -140);

      for (const fire of projectiles) {
        fire.x += fire.vx;
        fire.y += fire.vy;
        fire.anim += 0.28;
        fire.corePhase += 0.22;
        fire.width = 52 + Math.sin(fire.anim * 1.1) * 8;
        fire.height = 22 + Math.sin(fire.anim * 1.7) * 3;
        if (Math.random() < 0.9) {
          spawnFlameTrail(fire.x + fire.width * 0.92, fire.y + fire.height * 0.52);
        }
      }
      projectiles = projectiles.filter(f => f.x + f.width > -80 && f.y > 0 && f.y < canvas.height);

      for (const item of items) {
        item.x -= gameSpeed;
        item.bob += 0.09;
        item.y = item.baseY + Math.sin(item.bob) * 8;
      }
      items = items.filter(i => i.x + i.width > -80);

      for (const cloud of clouds) {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.w < -10) {
          cloud.x = canvas.width + Math.random() * 120;
          cloud.y = 30 + Math.random() * 120;
        }
      }

      for (const s of sparkles) {
        s.x -= 0.3;
        s.tw += 0.05;
        if (s.x < -10) {
          s.x = canvas.width + Math.random() * 100;
          s.y = 20 + Math.random() * 180;
        }
      }
    }

    function updateParticles() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.type === 'heal' ? 0.02 : 0.08;
        p.life -= 1;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function gainScore(amount) {
      score += amount;
      scoreEl.textContent = String(score);
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('heroJumpBestScore', String(bestScore));
        bestScoreEl.textContent = String(bestScore);
      }
    }

    function playerRect() {
      return {
        x: player.x + 10,
        y: player.y + 6,
        w: player.width - 18,
        h: player.height - 8
      };
    }

    function getAttackPhase() {
      if (!player.isAttacking) return 0;
      return ATTACK_TOTAL_FRAMES - player.attackTimer;
    }

    function swordHitBox() {
      if (!player.hasSword || !player.isAttacking) return null;
      const phase = getAttackPhase();

      if (phase < 7) {
        return { x: player.x + 18, y: player.y - 88, w: 58, h: 102 };
      }
      if (phase < 18) {
        return { x: player.x + 42, y: player.y - 26, w: 120, h: 120 };
      }
      return { x: player.x + 52, y: player.y + 12, w: 92, h: 78 };
    }

    function rectsIntersect(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function takeDamage() {
      if (player.invincibleTimer > 0) return;
      life -= 1;
      player.invincibleTimer = HIT_INVINCIBLE_FRAMES;
      player.hasSword = false;
      player.isAttacking = false;
      player.attackTimer = 0;
      updateLifeUI();
      updateSwordUI();
      spawnExplosion(player.x + player.width / 2, player.y + player.height / 2, true);

      if (life <= 0) {
        gameOver();
      } else {
        statusEl.textContent = 'ダメージ！ ライフが減った';
      }
    }

    function checkCollisions() {
      const p = playerRect();
      const slash = swordHitBox();

      for (const obstacle of obstacles) {
        const o = { x: obstacle.x + 4, y: obstacle.y + 4, w: obstacle.width - 8, h: obstacle.height - 8 };
        if (rectsIntersect(p, o)) {
          takeDamage();
          obstacle.x -= 18;
          break;
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        const e = enemy.type === 'beast'
          ? { x: enemy.x + 2, y: enemy.y + 6, w: 82, h: 90 }
          : { x: enemy.x + 6, y: enemy.y + 4, w: enemy.width - 12, h: enemy.height - 8 };

        if (enemy.type !== 'beast' && slash && rectsIntersect(slash, e)) {
          spawnExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, true);
          enemies.splice(i, 1);
          gainScore(3);
          continue;
        }

        if (rectsIntersect(p, e)) {
          takeDamage();
          enemy.x -= 20;
          break;
        }
      }

      for (const fire of projectiles) {
        const f = { x: fire.x + 4, y: fire.y + 2, w: fire.width - 8, h: fire.height - 4 };
        if (rectsIntersect(p, f)) {
          takeDamage();
          fire.x = -999;
          break;
        }
      }

      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        const r = { x: item.x, y: item.y, w: item.width, h: item.height };
        if (!rectsIntersect(p, r)) continue;

        if (item.type === 'sword') {
          player.hasSword = true;
          updateSwordUI();
          statusEl.textContent = '大剣を装備した！';
          items.splice(i, 1);
        } else if (item.type === 'heart') {
          if (life < MAX_LIFE) {
            life += 1;
            updateLifeUI();
            statusEl.textContent = 'ライフ回復！';
            spawnHealSparkle(item.x + item.width / 2, item.y + item.height / 2);
            items.splice(i, 1);
          }
        }
      }
    }

    function gameOver() {
      gameState = 'gameover';
      statusEl.textContent = 'ゲームオーバー';
      spawnExplosion(player.x + player.width / 2, player.y + player.height / 2, true);
    }

    function update() {
      if (gameState !== 'playing') return;
      frameCount++;
      groundOffset += gameSpeed;
      gameSpeed += 0.0015;
      updatePlayer();
      maybeSpawnEntities();
      updateEntities();
      updateParticles();
      checkCollisions();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      skyGrad.addColorStop(0, '#6daee6');
      skyGrad.addColorStop(0.55, '#d6ecff');
      skyGrad.addColorStop(1, '#eff9ff');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, canvas.width, GROUND_Y);

      const glow = ctx.createRadialGradient(canvas.width * 0.78, 80, 20, canvas.width * 0.78, 80, 170);
      glow.addColorStop(0, 'rgba(255,255,255,0.65)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(canvas.width * 0.78, 80, 170, 0, Math.PI * 2);
      ctx.fill();

      const backMountain = ctx.createLinearGradient(0, 220, 0, GROUND_Y);
      backMountain.addColorStop(0, 'rgba(115,150,187,0.95)');
      backMountain.addColorStop(1, 'rgba(85,120,156,0.95)');
      ctx.fillStyle = backMountain;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(120, 250);
      ctx.lineTo(260, GROUND_Y);
      ctx.lineTo(420, 220);
      ctx.lineTo(610, GROUND_Y);
      ctx.lineTo(760, 240);
      ctx.lineTo(980, GROUND_Y);
      ctx.lineTo(canvas.width, GROUND_Y);
      ctx.closePath();
      ctx.fill();

      for (const s of sparkles) {
        const alpha = s.a + Math.sin(s.tw) * 0.12;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const cloud of clouds) drawCloud(cloud);

      const fieldGrad = ctx.createLinearGradient(0, GROUND_Y, 0, canvas.height);
      fieldGrad.addColorStop(0, '#84c95a');
      fieldGrad.addColorStop(1, '#4f8f30');
      ctx.fillStyle = fieldGrad;
      ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(0, GROUND_Y + 4, canvas.width, 8);

      ctx.fillStyle = '#6bb042';
      for (let i = 0; i < canvas.width / 46 + 4; i++) {
        const x = i * 46 - (groundOffset % 46);
        ctx.fillRect(x, GROUND_Y, 24, 8);
      }

      ctx.fillStyle = '#6e4d2d';
      ctx.fillRect(0, GROUND_Y + 8, canvas.width, 10);
    }

    function drawCloud(cloud) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(cloud.x, cloud.y + cloud.h * 0.5, cloud.h * 0.55, 0, Math.PI * 2);
      ctx.arc(cloud.x + cloud.w * 0.28, cloud.y + cloud.h * 0.36, cloud.h * 0.68, 0, Math.PI * 2);
      ctx.arc(cloud.x + cloud.w * 0.56, cloud.y + cloud.h * 0.48, cloud.h * 0.8, 0, Math.PI * 2);
      ctx.arc(cloud.x + cloud.w * 0.82, cloud.y + cloud.h * 0.44, cloud.h * 0.58, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHero() {
      const blink = player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0;
      if (blink) return;

      const legSwing = player.isOnGround ? Math.sin(player.animTimer * 0.35) * 5 : 0;
      const capeSwing = Math.sin(player.animTimer * 0.2) * 3;
      const phase = getAttackPhase();
      const bodyLean = player.isAttacking
        ? (phase < 8 ? -phase * 0.7 : phase < 18 ? -5 + (phase - 8) * 2 : 15 - (phase - 18) * 1.3)
        : 0;
      const torsoYOffset = player.isAttacking && phase >= 8 && phase <= 18 ? 4 : 0;

      ctx.save();
      ctx.translate(player.x + 18, player.y + 18 + torsoYOffset);
      ctx.rotate(bodyLean * Math.PI / 180);
      ctx.translate(-18, -18);

      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.beginPath();
      ctx.ellipse(player.width / 2, player.height + 10, 26, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      const capeGrad = ctx.createLinearGradient(0, 20, 0, 54);
      capeGrad.addColorStop(0, '#cb2235');
      capeGrad.addColorStop(1, '#7f1021');
      ctx.fillStyle = capeGrad;
      ctx.beginPath();
      ctx.moveTo(10, 22);
      ctx.lineTo(2 - capeSwing - bodyLean * 0.15, 56);
      ctx.lineTo(18, 52);
      ctx.lineTo(20, 22);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#5a3d2b';
      ctx.fillRect(20, 2, 20, 12);
      ctx.fillStyle = '#d3a577';
      ctx.fillRect(18, 10, 24, 18);
      ctx.fillStyle = '#102a43';
      ctx.fillRect(34, 16, 3, 3);

      const armorGrad = ctx.createLinearGradient(0, 28, 0, 50);
      armorGrad.addColorStop(0, '#4c84dd');
      armorGrad.addColorStop(1, '#244f96');
      ctx.fillStyle = armorGrad;
      ctx.fillRect(16, 28, 30, 24);
      ctx.fillStyle = '#cfe3ff';
      ctx.fillRect(24, 28, 14, 24);
      ctx.fillStyle = '#e5ecf5';
      ctx.fillRect(14, 26, 34, 8);
      ctx.fillRect(20, 50, 8, 10);
      ctx.fillRect(32, 50, 8, 10);

      ctx.fillStyle = '#4b2e1f';
      ctx.fillRect(20, 60, 8, 16 + legSwing);
      ctx.fillRect(33, 60, 8, 16 - legSwing);
      ctx.fillRect(10, 34, 8, 18 - legSwing * 0.4);

      if (player.hasSword && !player.isAttacking) {
        ctx.save();
        ctx.translate(42, 38);
        ctx.rotate(0.36);
        ctx.fillStyle = '#6b3fa0';
        ctx.fillRect(2, 18, 10, 14);
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-12, 12, 32, 8);
        const bladeGrad = ctx.createLinearGradient(0, -74, 0, 14);
        bladeGrad.addColorStop(0, '#ffffff');
        bladeGrad.addColorStop(0.45, '#dbe5ef');
        bladeGrad.addColorStop(1, '#8d9cab');
        ctx.fillStyle = bladeGrad;
        ctx.fillRect(1, -74, 9, 88);
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.fillRect(4, -74, 2, 70);
        ctx.beginPath();
        ctx.moveTo(1, -74);
        ctx.lineTo(10, -74);
        ctx.lineTo(5.5, -96);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      ctx.save();
      ctx.translate(44, 38);
      let armAngle = -0.15;
      if (player.hasSword) armAngle = 0.26;
      if (player.isAttacking) {
        if (phase < 7) armAngle = -1.55 - phase * 0.08;
        else if (phase < 18) armAngle = -2.1 + (phase - 7) * 0.31;
        else armAngle = 1.3 - (phase - 18) * 0.12;
      }
      ctx.rotate(armAngle);

      ctx.fillStyle = '#4b2e1f';
      ctx.fillRect(-5, -6, 10, 22);

      if (player.hasSword) {
        ctx.fillStyle = '#6b3fa0';
        ctx.fillRect(2, 18, 10, 14);
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-12, 12, 32, 8);
        const bladeGrad = ctx.createLinearGradient(0, -74, 0, 14);
        bladeGrad.addColorStop(0, '#ffffff');
        bladeGrad.addColorStop(0.45, '#dbe5ef');
        bladeGrad.addColorStop(1, '#8d9cab');
        ctx.fillStyle = bladeGrad;
        ctx.fillRect(1, -74, 9, 88);
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.fillRect(4, -74, 2, 70);
        ctx.beginPath();
        ctx.moveTo(1, -74);
        ctx.lineTo(10, -74);
        ctx.lineTo(5.5, -96);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      ctx.restore();
    }

    function drawObstacle(obstacle) {
      const grad = ctx.createLinearGradient(0, obstacle.y, 0, obstacle.y + obstacle.height);
      grad.addColorStop(0, '#80665b');
      grad.addColorStop(1, '#544139');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(obstacle.x + obstacle.width * 0.1, obstacle.y + obstacle.height);
      ctx.lineTo(obstacle.x + obstacle.width * 0.25, obstacle.y + obstacle.height * 0.12);
      ctx.lineTo(obstacle.x + obstacle.width * 0.5, obstacle.y);
      ctx.lineTo(obstacle.x + obstacle.width * 0.75, obstacle.y + obstacle.height * 0.18);
      ctx.lineTo(obstacle.x + obstacle.width * 0.9, obstacle.y + obstacle.height);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(obstacle.x + 8, obstacle.y + 10, obstacle.width - 16, 8);
    }

    function drawKnight(enemy) {
      const bob = Math.sin(enemy.anim) * 2;
      ctx.save();
      ctx.translate(enemy.x, enemy.y + bob);
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.beginPath();
      ctx.ellipse(enemy.width / 2, enemy.height + 8, 20, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3d2c8d';
      ctx.fillRect(10, 8, 32, 28);
      ctx.fillStyle = '#1b1b3a';
      ctx.fillRect(14, 0, 24, 18);
      ctx.fillStyle = '#ff4d6d';
      ctx.fillRect(18, 8, 4, 4);
      ctx.fillRect(30, 8, 4, 4);
      ctx.fillStyle = '#2b2d42';
      ctx.fillRect(12, 36, 8, 18);
      ctx.fillRect(32, 36, 8, 18);
      ctx.fillRect(4, 16, 8, 16);
      ctx.fillRect(40, 16, 8, 16);
      ctx.restore();
    }

    function drawBeast(enemy) {
      const bob = Math.sin(enemy.anim) * 1.8;
      ctx.save();
      ctx.translate(enemy.x, enemy.y + bob);

      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(enemy.width * 0.42, enemy.height + 10, 38, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      const bodyGrad = ctx.createLinearGradient(0, 0, enemy.width, enemy.height);
      bodyGrad.addColorStop(0, '#56736e');
      bodyGrad.addColorStop(0.55, '#2f4746');
      bodyGrad.addColorStop(1, '#182629');
      ctx.fillStyle = bodyGrad;

      ctx.beginPath();
      ctx.moveTo(enemy.width * 0.52, 54);
      ctx.quadraticCurveTo(enemy.width * 0.78, 44, enemy.width + 8, 58);
      ctx.quadraticCurveTo(enemy.width * 0.84, 64, enemy.width * 0.56, 66);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(48, 56, 34, 25, -0.15, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(24, 46);
      ctx.quadraticCurveTo(8, 26, 18, 8);
      ctx.quadraticCurveTo(30, -6, 48, 8);
      ctx.quadraticCurveTo(42, 22, 30, 30);
      ctx.lineTo(28, 44);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(18, 10);
      ctx.lineTo(-8, 6);
      ctx.lineTo(6, 18);
      ctx.lineTo(24, 20);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(10, 20);
      ctx.lineTo(-10, 24);
      ctx.lineTo(8, 32);
      ctx.lineTo(24, 28);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#f8f4e8';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(4 - i * 4, 19);
        ctx.lineTo(1 - i * 4, 24);
        ctx.lineTo(7 - i * 4, 23);
        ctx.closePath();
        ctx.fill();
      }
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(2 - i * 4, 24);
        ctx.lineTo(-1 - i * 4, 20);
        ctx.lineTo(4 - i * 4, 21);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = '#152126';
      ctx.beginPath();
      ctx.arc(24, 10, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcf33';
      ctx.beginPath();
      ctx.arc(23, 10, 3.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(15, 5);
      ctx.lineTo(28, 2);
      ctx.stroke();

      ctx.fillStyle = '#6dd0ae';
      for (let i = 0; i < 5; i++) {
        const sx = 46 + i * 10;
        const sy = 30 - (i % 2) * 4;
        ctx.beginPath();
        ctx.moveTo(sx, sy + 8);
        ctx.lineTo(sx + 5, sy - 8);
        ctx.lineTo(sx + 11, sy + 8);
        ctx.closePath();
        ctx.fill();
      }

      ctx.fillStyle = '#24373b';
      ctx.fillRect(26, 44, 8, 16);
      ctx.fillRect(32, 50, 9, 6);
      ctx.fillRect(42, 72, 12, 24);
      ctx.fillRect(60, 70, 12, 26);
      ctx.fillRect(38, 92, 22, 6);
      ctx.fillRect(58, 92, 22, 6);

      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.ellipse(40, 50, 18, 10, -0.2, 0, Math.PI * 2);
      ctx.fill();

      if (!enemy.hasBreathed && enemy.fireCooldown < 24) {
        ctx.fillStyle = 'rgba(255,120,0,0.55)';
        ctx.beginPath();
        ctx.ellipse(-18, 24, 28 + Math.sin(enemy.anim * 2) * 4, 11, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawProjectile(fire) {
      ctx.save();
      ctx.translate(fire.x, fire.y);
      ctx.scale(-1, 1);

      const w = fire.width;
      const h = fire.height;

      const outer = ctx.createLinearGradient(0, 0, w, 0);
      outer.addColorStop(0, '#ff3b1f');
      outer.addColorStop(0.55, '#ff9f1c');
      outer.addColorStop(1, '#ffe29a');
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.moveTo(0, h * 0.5);
      ctx.quadraticCurveTo(w * 0.25, -6 + Math.sin(fire.anim) * 3, w, h * 0.46);
      ctx.quadraticCurveTo(w * 0.66, h * 0.5, w * 0.88, h * 0.14);
      ctx.quadraticCurveTo(w * 0.68, h * 0.48, w * 0.9, h * 0.88);
      ctx.quadraticCurveTo(w * 0.64, h * 0.56, 0, h * 0.5);
      ctx.fill();

      const inner = ctx.createLinearGradient(0, 0, w, 0);
      inner.addColorStop(0, 'rgba(255,255,210,0.95)');
      inner.addColorStop(1, 'rgba(255,210,90,0.2)');
      ctx.fillStyle = inner;
      ctx.beginPath();
      ctx.moveTo(w * 0.15, h * 0.5);
      ctx.quadraticCurveTo(w * 0.44, h * 0.14 + Math.sin(fire.corePhase) * 1.5, w * 0.82, h * 0.46);
      ctx.quadraticCurveTo(w * 0.56, h * 0.5, w * 0.8, h * 0.76);
      ctx.quadraticCurveTo(w * 0.48, h * 0.58, w * 0.15, h * 0.5);
      ctx.fill();

      ctx.restore();
    }

    function drawItem(item) {
      ctx.save();
      ctx.translate(item.x + item.width / 2, item.y + item.height / 2);
      if (item.type === 'sword') {
        ctx.rotate(-0.45);
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-10, 6, 20, 5);
        ctx.fillStyle = '#6b3fa0';
        ctx.fillRect(-4, 11, 8, 10);
        const bladeGrad = ctx.createLinearGradient(0, -30, 0, 10);
        bladeGrad.addColorStop(0, '#ffffff');
        bladeGrad.addColorStop(1, '#9eabba');
        ctx.fillStyle = bladeGrad;
        ctx.fillRect(-3, -30, 6, 40);
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillRect(-1, -30, 2, 30);
        ctx.beginPath();
        ctx.moveTo(-3, -30);
        ctx.lineTo(3, -30);
        ctx.lineTo(0, -42);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillStyle = '#ff4d6d';
        ctx.beginPath();
        ctx.moveTo(0, 10);
        ctx.bezierCurveTo(18, -6, 16, -24, 0, -10);
        ctx.bezierCurveTo(-16, -24, -18, -6, 0, 10);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(-4, -8, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.fillStyle = p.color;
        if (p.type === 'heal') {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y - p.size);
          ctx.lineTo(p.x + p.size * 0.5, p.y);
          ctx.lineTo(p.x, p.y + p.size);
          ctx.lineTo(p.x - p.size * 0.5, p.y);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawOverlay() {
      ctx.textAlign = 'center';
      if (gameState === 'ready') {
        ctx.fillStyle = 'rgba(16,42,67,0.14)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#102a43';
        ctx.font = 'bold 46px Arial';
        ctx.fillText('勇者ジャンプアクション', canvas.width / 2, 150);
        ctx.font = '24px Arial';
        ctx.fillText('大剣で敵を斬り、怪獣の炎はジャンプで回避', canvas.width / 2, 205);
        ctx.fillText('スマホでは横向きでプレイ', canvas.width / 2, 245);
      }
      if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.34)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 54px Arial';
        ctx.fillText('GAME OVER', canvas.width / 2, 170);
        ctx.font = '28px Arial';
        ctx.fillText(`スコア: ${score}`, canvas.width / 2, 230);
        ctx.fillText(`ベスト: ${bestScore}`, canvas.width / 2, 270);
        ctx.fillText('再開ボタン または R キーでリスタート', canvas.width / 2, 330);
      }
    }

    function draw() {
      drawBackground();
      drawParticles();
      for (const item of items) drawItem(item);
      for (const obstacle of obstacles) drawObstacle(obstacle);
      for (const fire of projectiles) drawProjectile(fire);
      for (const enemy of enemies) {
        if (enemy.type === 'beast') drawBeast(enemy);
        else drawKnight(enemy);
      }
      drawHero();
      drawOverlay();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function handleActionKey(e) {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jump();
      }
      if (e.code === 'KeyX') {
        e.preventDefault();
        attack();
      }
      if (e.code === 'KeyR' && gameState === 'gameover') {
        restartGame();
      }
    }

    window.addEventListener('keydown', handleActionKey, { passive: false });

    canvas.addEventListener('mousedown', () => {
      if (gameState === 'gameover') return;
      jump();
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (gameState === 'gameover') return;
      jump();
    }, { passive: false });

    jumpButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (gameState === 'gameover') return;
      jump();
    }, { passive: false });

    jumpButton.addEventListener('click', () => {
      if (gameState === 'gameover') return;
      jump();
    });

    attackButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      attack();
    }, { passive: false });

    attackButton.addEventListener('click', () => {
      attack();
    });

    restartButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      restartGame();
    }, { passive: false });

    restartButton.addEventListener('click', () => {
      restartGame();
    });

    jumpButton.addEventListener('contextmenu', e => e.preventDefault());
    attackButton.addEventListener('contextmenu', e => e.preventDefault());
    restartButton.addEventListener('contextmenu', e => e.preventDefault());

    resetGame();
    gameLoop();
  </script>
</body>
</html>
